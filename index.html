<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎪 Kermesse Tirage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap');
:root{--red:#FF3B3B;--yellow:#FFD93D;--blue:#4CC9F0;--green:#6BCB77;--purple:#C77DFF;--orange:#FF9F1C;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;min-height:100dvh;background:#0d0520;font-family:'Nunito',sans-serif;overflow:hidden;}
body{background:radial-gradient(circle at 20% 20%,rgba(255,59,59,.18) 0%,transparent 45%),radial-gradient(circle at 80% 75%,rgba(76,201,240,.15) 0%,transparent 45%),radial-gradient(circle at 50% 50%,rgba(199,125,255,.1) 0%,transparent 60%),#0d0520;}

/* RESET BTN top-left */
.btn-reset{position:fixed;top:env(safe-area-inset-top,10px);left:12px;z-index:20;background:none;border:1px solid rgba(255,100,100,.2);color:rgba(255,100,100,.4);font-family:'Nunito',sans-serif;font-weight:700;font-size:.6rem;padding:4px 10px;border-radius:50px;cursor:pointer;}
.btn-reset:active{border-color:var(--red);color:var(--red);}

/* BUNTING */
.bunting{display:flex;align-items:flex-start;justify-content:center;gap:3px;position:relative;padding-top:4px;width:100%;flex-shrink:0;}
.bunting::before{content:'';position:absolute;top:4px;left:0;right:0;height:1px;background:rgba(255,217,61,.4);}
.flag{width:20px;height:26px;clip-path:polygon(0 0,100% 0,100% 75%,50% 100%,0 75%);position:relative;top:4px;flex-shrink:0;}
.flag:nth-child(odd){animation:sway 3s ease-in-out infinite;}
.flag:nth-child(even){animation:sway 3s ease-in-out infinite reverse;}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}

/* LAYOUT */
.app{display:flex;flex-direction:column;align-items:center;height:100dvh;padding:env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,12px);}
.title{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.4rem);color:var(--yellow);text-shadow:3px 3px 0 var(--red),0 0 25px rgba(255,217,61,.4);text-align:center;animation:pulse 2s ease-in-out infinite;margin:6px 0 2px;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
.info{font-size:.75rem;color:rgba(255,255,255,.35);font-weight:700;text-align:center;margin-bottom:4px;}

/* WINNERS STRIP */
.strip{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;padding:4px 16px;max-height:48px;overflow-y:auto;width:100%;flex-shrink:0;}
.strip::-webkit-scrollbar{display:none;}
.wchip{background:rgba(107,203,119,.18);border:1px solid rgba(107,203,119,.35);color:var(--green);font-size:.6rem;font-weight:800;padding:2px 8px;border-radius:50px;}

/* WHEEL */
.wheel-area{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;}
.wheel-wrap{position:relative;width:min(72vw,320px);height:min(72vw,320px);}
.pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:30px solid var(--yellow);filter:drop-shadow(0 3px 6px rgba(255,217,61,.7));z-index:10;}
#wheel{border-radius:50%;display:block;width:100%;height:100%;transition:box-shadow .15s;}
#wheel.spinning{box-shadow:0 0 0 5px rgba(255,217,61,.8),0 0 0 12px rgba(255,59,59,.45),0 0 80px rgba(255,217,61,.4);}
.hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:42px;height:42px;background:radial-gradient(circle at 40% 35%,#ffe566,var(--yellow));border-radius:50%;border:4px solid white;box-shadow:0 0 16px rgba(255,217,61,.6);display:flex;align-items:center;justify-content:center;font-size:1.1rem;z-index:5;}

/* BOTTOM */
.bottom{width:100%;padding:12px 20px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.07);border-radius:24px 24px 0 0;flex-shrink:0;}
.counts{display:flex;gap:8px;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.4);}
.counts span{background:rgba(255,255,255,.08);padding:2px 12px;border-radius:50px;}
.btn-spin{width:100%;font-family:'Fredoka One',cursive;font-size:1.3rem;padding:15px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--red),var(--orange));color:white;cursor:pointer;box-shadow:0 6px 0 #b32020,0 10px 28px rgba(255,59,59,.4);position:relative;overflow:hidden;letter-spacing:.5px;text-shadow:1px 2px 0 rgba(0,0,0,.2);}
.btn-spin::after{content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transform:skewX(-20deg);animation:shine 2.5s infinite;}
@keyframes shine{0%{left:-80%}40%,100%{left:160%}}
.btn-spin:active:not(:disabled){transform:translateY(4px);box-shadow:0 2px 0 #b32020;}
.btn-spin:disabled{opacity:.45;cursor:not-allowed;}

/* FIREWORKS */
#fw{position:fixed;inset:0;pointer-events:none;z-index:50;}

/* WINNER OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(13,5,32,.9);backdrop-filter:blur(10px);z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;}
.overlay.show{display:flex;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.wcard{animation:pop .55s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.2) rotate(-8deg);opacity:0}to{transform:scale(1);opacity:1}}
.trophy{font-size:4.5rem;display:block;animation:trophyAnim 1.2s ease-in-out infinite;}
@keyframes trophyAnim{0%,100%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.1)}}
.wlabel{font-family:'Fredoka One',cursive;font-size:.95rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:3px;margin:6px 0;}
.wname{font-family:'Fredoka One',cursive;font-size:clamp(2rem,7vw,2.8rem);color:var(--yellow);line-height:1.1;text-shadow:3px 3px 0 var(--orange),0 0 50px rgba(255,217,61,.7);animation:glow 1.5s ease-in-out infinite;word-break:break-word;}
@keyframes glow{0%,100%{text-shadow:3px 3px 0 var(--orange),0 0 50px rgba(255,217,61,.7)}50%{text-shadow:3px 3px 0 var(--orange),0 0 90px rgba(255,217,61,1)}}
.wticket{font-size:.82rem;color:rgba(255,255,255,.4);margin-top:5px;}
.wrem{font-size:.78rem;color:rgba(255,255,255,.3);margin-top:3px;}
.btn-close{margin-top:28px;font-family:'Fredoka One',cursive;font-size:1.05rem;padding:13px 40px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--blue),var(--purple));color:white;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.3),0 10px 25px rgba(76,201,240,.3);}
.btn-close:active{transform:translateY(3px);}
</style>
</head>
<body>
<canvas id="fw"></canvas>
<button class="btn-reset" onclick="resetAll()">🔄 Réinitialiser</button>

<div class="overlay" id="overlay">
  <div class="wcard">
    <span class="trophy">🏆</span>
    <div class="wlabel">✨ Grand Gagnant ✨</div>
    <div class="wname" id="wname"></div>
    <div class="wticket" id="wticket"></div>
    <div class="wrem" id="wrem"></div>
    <button class="btn-close" onclick="closeWinner()">🎉 Continuer !</button>
  </div>
</div>

</div>

const COLORS=["#FF3B3B","#FFD93D","#4CC9F0","#6BCB77","#C77DFF","#FF9F1C","#FF6BD6","#FF8F70","#7BE8D5","#A8FF78"];
const BUNTING=["#FF3B3B","#FFD93D","#4CC9F0","#6BCB77","#C77DFF","#FF9F1C","#FF6BD6"];
const N_SEGMENTS = 10; // nombre fixe de segments visuels

let drawn=[], spinning=false, angle=0, raf;

// Bunting
const b=document.getElementById('bunting');
for(let i=0;i<26;i++){const f=document.createElement('div');f.className='flag';f.style.background=BUNTING[i%BUNTING.length];b.appendChild(f);}

function remaining(){return TICKETS.map((_,i)=>i).filter(i=>!drawn.includes(i));}

function updateUI(){
  const rem=remaining();
  document.getElementById('info').textContent=TICKETS.length+' billets — '+rem.length+' restant'+(rem.length>1?'s':'');
  document.getElementById('remCount').textContent='🎟️ '+rem.length+' restant'+(rem.length>1?'s':'');
  document.getElementById('drawnCount').textContent='✅ '+drawn.length+' tiré'+(drawn.length>1?'s':'');
  const strip=document.getElementById('strip');
  strip.innerHTML=drawn.map(i=>`<span class="wchip">🏆 ${TICKETS[i].split(' — ')[0]}</span>`).join('');
  const btn=document.getElementById('spinBtn');
  if(rem.length===0){btn.disabled=true;btn.textContent='🎊 Tous les billets tirés !';}
  else{btn.disabled=false;btn.textContent='🎰 Lancer le tirage !';}
}

// Canvas setup
const canvas=document.getElementById('wheel');
function resizeCanvas(){
  const w=document.getElementById('wrapEl').offsetWidth;
  canvas.width=w;canvas.height=w;
}
resizeCanvas();
window.addEventListener('resize',()=>{resizeCanvas();drawWheel();});

// La roue a toujours N_SEGMENTS fixes — juste visuel
function drawWheel(winnerSeg=-1){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,cx=W/2,r=cx-6;
  ctx.clearRect(0,0,W,W);
  const rem=remaining();
  if(rem.length===0){
    const g=ctx.createRadialGradient(cx,cx,0,cx,cx,r);
    g.addColorStop(0,'#2a1060');g.addColorStop(1,'#1a0a3e');
    ctx.beginPath();ctx.arc(cx,cx,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(107,203,119,.6)';ctx.lineWidth=4;ctx.stroke();
    ctx.fillStyle='rgba(107,203,119,.9)';ctx.font='bold 14px Nunito,sans-serif';ctx.textAlign='center';
    ctx.fillText('🎊 Tous tirés !',cx,cx);return;
  }
  const sl=(Math.PI*2)/N_SEGMENTS;
  for(let i=0;i<N_SEGMENTS;i++){
    const sa=angle+i*sl,ea=sa+sl,isW=(i===winnerSeg);
    ctx.beginPath();ctx.moveTo(cx,cx);ctx.arc(cx,cx,r,sa,ea);ctx.closePath();
    if(isW){ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=25;ctx.fill();ctx.shadowBlur=0;}
    else{ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();}
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1.5;ctx.stroke();
    // label décoratif
    ctx.save();ctx.translate(cx,cx);ctx.rotate(sa+sl/2);
    ctx.font='bold 18px Nunito,sans-serif';
    ctx.fillStyle=isW?'#FF6B00':'rgba(255,255,255,.85)';
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=2;
    ctx.fillText('🎟',r-14,0);ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cx,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,217,61,.55)';ctx.lineWidth=4;ctx.stroke();
}

function spin(){
  if(spinning)return;
  const rem=remaining();if(rem.length===0)return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  canvas.classList.add('spinning');
  // Choisir un billet au hasard parmi les restants
  const wi=rem[Math.floor(Math.random()*rem.length)];
  // Segment gagnant : un segment au hasard (visuel seulement)
  const winSeg=Math.floor(Math.random()*N_SEGMENTS);
  // Angle cible : pointer sur winSeg
  const sl=(Math.PI*2)/N_SEGMENTS;
  const targetAngle=angle+(-Math.PI/2-(winSeg*sl+sl/2))+(6+Math.random()*4)*Math.PI*2;
  const dur=3200,t0=performance.now(),a0=angle;
  function ease(t){if(t<.15)return(t/.15)*2.5*(.15*.15)/(1);const p=(t-.15)/.85;return 1-Math.pow(1-p,4);}
  // simpler easing
  function easeOut(t){return 1-Math.pow(1-t,4);}
  function anim(now){
    const t=Math.min((now-t0)/dur,1);
    angle=a0+(targetAngle-a0)*easeOut(t);drawWheel();
    if(t<1){raf=requestAnimationFrame(anim);}
    else{
      angle=targetAngle;spinning=false;canvas.classList.remove('spinning');drawWheel(winSeg);
      const wrap=document.getElementById('wrapEl');
      const offs=[10,-10,8,-8,5,-5,3,-3,0];let i=0;
      const sh=setInterval(()=>{
        if(i>=offs.length){clearInterval(sh);wrap.style.transform='';
          drawn.push(wi);updateUI();showWinner(wi);}
        else{wrap.style.transform=`translateX(${offs[i++]}px)`;}
      },45);
    }
  }
  cancelAnimationFrame(raf);requestAnimationFrame(anim);
}

function showWinner(idx){
  const rem=remaining().length;
  document.getElementById('wname').textContent=TICKETS[idx].split(' — ')[0];
  document.getElementById('wticket').textContent='🎟️ '+TICKETS[idx].split(' — ')[1];
  document.getElementById('wrem').textContent=rem>0?rem+' billet'+(rem>1?'s':'')+ ' encore en jeu':'🎊 Tous les billets tirés !';
  document.getElementById('overlay').classList.add('show');
  startFW();
}
function closeWinner(){document.getElementById('overlay').classList.remove('show');stopFW();}
function resetAll(){if(!confirm('Réinitialiser tous les tirages ?'))return;drawn=[];updateUI();drawWheel();}

// Fireworks
const fw=document.getElementById('fw'),fwc=fw.getContext('2d');
let fp=[],fwrun=false,fwraf;
function resizeFW(){fw.width=window.innerWidth;fw.height=window.innerHeight;}
resizeFW();window.addEventListener('resize',resizeFW);
function burst(){
  const cols=["#FF3B3B","#FFD93D","#4CC9F0","#6BCB77","#C77DFF","#FF9F1C","#FF6BD6","#fff"];
  const c=cols[Math.floor(Math.random()*cols.length)];
  const x=50+Math.random()*(fw.width-100),y=fw.height*(.1+Math.random()*.5);
  for(let i=0;i<65;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*6;fp.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,alpha:1,color:c,size:2+Math.random()*2.5,trail:[]});}
}
function startFW(){fwrun=true;fp=[];let last=0;
  function loop(now){if(!fwrun)return;fwc.clearRect(0,0,fw.width,fw.height);
    if(now-last>400){burst();last=now;}
    for(let i=fp.length-1;i>=0;i--){const p=fp[i];
      p.trail.push({x:p.x,y:p.y});if(p.trail.length>5)p.trail.shift();
      p.trail.forEach((t,j)=>{fwc.globalAlpha=(j/p.trail.length)*p.alpha*.3;fwc.beginPath();fwc.arc(t.x,t.y,p.size*.5,0,Math.PI*2);fwc.fillStyle=p.color;fwc.fill();});
      fwc.globalAlpha=p.alpha;fwc.beginPath();fwc.arc(p.x,p.y,p.size,0,Math.PI*2);fwc.fillStyle=p.color;fwc.fill();
      p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.vx*=.98;p.vy*=.98;p.alpha-=.013;p.size*=.994;
      if(p.alpha<=0)fp.splice(i,1);}
    fwc.globalAlpha=1;fwraf=requestAnimationFrame(loop);}
  requestAnimationFrame(loop);}
function stopFW(){fwrun=false;cancelAnimationFrame(fwraf);fwc.clearRect(0,0,fw.width,fw.height);fp=[];}

updateUI();drawWheel();
</script>
